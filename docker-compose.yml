services:
  server:
    image: node:24-alpine
    container_name: baby-server
    restart: unless-stopped
    working_dir: /app
    command: ["node", "dist/index.js"]
    volumes:
      - ./server:/app:ro
      - db_data:/app/data
    environment:
      - DB_PATH=/app/data/baby.db
      - PORT=4001
    expose:
      - "4001"

  client:
    image: nginx:alpine
    container_name: baby-client
    restart: unless-stopped
    ports:
      - "4000:80"
    volumes:
      - ./client/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - server

volumes:
  db_data:
